<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Whiteboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
    #app { width: 100vw; height: 100vh; }
    #status {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-family: sans-serif; font-size: 14px;
      color: #333; text-align: center;
      padding: 16px; background: rgba(255,255,255,0.95);
      border-radius: 10px; max-width: 90%;
    }
  </style>
</head>
<body>
  <div id="status">Connecting to whiteboard...</div>
  <div id="app"></div>
  <script src="https://cdn.jsdelivr.net/npm/@netless/white-web-sdk/dist/white-web-sdk.js"></script>
  <script>
    var params = new URLSearchParams(window.location.search);
    var uuid      = params.get('uuid');
    var roomToken = params.get('token');
    var appId     = params.get('appId') || '_NclsByREfG80ZkgOErgQw/qnwZvcHJypTHCw';
    var region    = params.get('region') || 'us-sv';

    if (!uuid || !roomToken) {
      document.getElementById('status').innerText = 'Missing room info.';
    } else {
      var sdk = new WhiteWebSdk({ appIdentifier: appId, region: region });
      sdk.joinRoom({
        uuid:       uuid,
        roomToken:  roomToken,
        isWritable: false,
        uid:        'stu-' + Date.now(),
        region:     region,
        floatBar:   false,
      }, {
        onPhaseChanged: function(phase) {
          document.getElementById('status').innerText = phase;
          if (phase === 'connected') {
            document.getElementById('status').style.display = 'none';
          }
        },
      }).then(function(room) {
        document.getElementById('status').style.display = 'none';
        room.bindHtmlElement(document.getElementById('app'));
      }).catch(function(err) {
        document.getElementById('status').innerText = 'Error: ' + (err.message || err);
        document.getElementById('status').style.color = 'red';
      });
    }
  </script>
</body>
</html>
