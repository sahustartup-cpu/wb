<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Whiteboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
    #app { width: 100vw; height: 100vh; }
    #status {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-family: sans-serif; font-size: 14px;
      color: #333; text-align: center;
      padding: 16px; background: rgba(255,255,255,0.95);
      border-radius: 10px; max-width: 90%;
    }
  </style>
</head>
<body>
  <div id="status">Loading...</div>
  <div id="app"></div>

  <!-- SDK bundled locally — no CDN needed -->
  <script src="white-web-sdk.js"></script>
  <script>
    function setStatus(msg, color) {
      var el = document.getElementById('status');
      el.innerText = msg;
      el.style.display = 'block';
      if (color) el.style.color = color;
    }

    if (typeof WhiteWebSdk === 'undefined') {
      setStatus('SDK missing. Upload sdk.js to GitHub.', 'red');
    } else {
      var params = new URLSearchParams(window.location.search);
      var uuid   = params.get('uuid');
      var token  = params.get('token');
      var region = params.get('region') || 'us-sv';
      var appId  = '_NclsByREfG80ZkgOErgQw/qnwZvcHJypTHCw';

      if (!uuid || !token) {
        setStatus('Missing room info.', 'red');
      } else {
        setStatus('Joining...');
        var sdk = new WhiteWebSdk({ appIdentifier: appId, region: region });
        sdk.joinRoom({
          uuid: uuid, roomToken: token,
          isWritable: false,
          uid: 'stu-' + Date.now(),
          region: region, floatBar: false,
        }, {
          onPhaseChanged: function(phase) {
            setStatus(phase);
            if (phase === 'connected') {
              document.getElementById('status').style.display = 'none';
            }
          },
        }).then(function(room) {
          document.getElementById('status').style.display = 'none';
          room.bindHtmlElement(document.getElementById('app'));
        }).catch(function(err) {
          setStatus('Error: ' + (err.message || err), 'red');
        });
      }
    }
  </script>
</body>
</html>
