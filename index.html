<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Whiteboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
    #app { width: 100vw; height: 100vh; }
    #status {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-family: sans-serif; font-size: 14px;
      color: #333; text-align: center;
      padding: 16px; background: rgba(255,255,255,0.95);
      border-radius: 10px; max-width: 90%;
    }
  </style>
</head>
<body>
  <div id="status">Loading SDK...</div>
  <div id="app"></div>
  <script>
    function setStatus(msg, color) {
      var el = document.getElementById('status');
      el.innerText = msg;
      el.style.display = 'block';
      if (color) el.style.color = color;
    }

    function initWB() {
      if (typeof WhiteWebSdk === 'undefined') {
        setStatus('SDK not available.', 'red');
        return;
      }
      var params   = new URLSearchParams(window.location.search);
      var uuid     = params.get('uuid');
      var token    = params.get('token');
      var region   = params.get('region') || 'us-sv';
      var appId    = '_NclsByREfG80ZkgOErgQw/qnwZvcHJypTHCw';

      if (!uuid || !token) { setStatus('Missing room info.', 'red'); return; }

      setStatus('Joining...');
      var sdk = new WhiteWebSdk({ appIdentifier: appId, region: region });
      sdk.joinRoom({
        uuid: uuid, roomToken: token,
        isWritable: false,
        uid: 'stu-' + Date.now(),
        region: region, floatBar: false,
      }, {
        onPhaseChanged: function(phase) {
          setStatus(phase);
          if (phase === 'connected') {
            document.getElementById('status').style.display = 'none';
          }
        },
      }).then(function(room) {
        document.getElementById('status').style.display = 'none';
        room.bindHtmlElement(document.getElementById('app'));
      }).catch(function(err) {
        setStatus('Error: ' + (err.message || err), 'red');
      });
    }

    // Try Netless own CDN first, then fallbacks
    var loaded = false;
    function trySDK(urls, i) {
      if (i >= urls.length) { setStatus('All CDNs failed.', 'red'); return; }
      var s = document.createElement('script');
      s.src = urls[i];
      s.onload = function() {
        if (!loaded) { loaded = true; initWB(); }
      };
      s.onerror = function() { trySDK(urls, i+1); };
      document.head.appendChild(s);
    }
    trySDK([
      'https://sdk.herewhite.com/white-web-sdk/2.16.42.js',
      'https://cdn.jsdelivr.net/npm/@netless/white-web-sdk@2.16.42/dist/white-web-sdk.js',
      'https://unpkg.com/@netless/white-web-sdk@2.16.42/dist/white-web-sdk.js',
    ], 0);
  </script>
</body>
</html>
